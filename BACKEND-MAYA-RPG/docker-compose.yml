
services:

  api:

    build: .

    container_name: maya_api

    ports:
      - "8080:8080"

    depends_on:
      - mysql

    environment:
      PORT: 8080
      DATABASE_URL: mysql://root:123456@mysql:3306/maya_rpg
      JWT_SECRET: troque-este-segredo-seguro-ok

    restart: always

  mysql:

    image: mysql:8

    container_name: maya_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: maya_rpg

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql-init:/docker-entrypoint-initdb.d:ro

volumes:

  mysql_data: